<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

  <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-6">
    <h1 class="text-2xl font-bold mb-6 text-gray-800">Expense Tracker</h1>

    <!-- Stats Section -->
    <div class="mb-6 space-y-3">
      <div class="bg-blue-50 p-4 rounded-lg border-l-4 border-blue-500">
        <p class="text-gray-600 text-sm">Balance</p>
        <p id="balance" class="text-3xl font-bold text-blue-600">$0.00</p>
      </div>
      
      <div class="grid grid-cols-2 gap-3">
        <div class="bg-green-50 p-3 rounded-lg">
          <p class="text-gray-600 text-sm">Income</p>
          <p id="income" class="text-2xl font-bold text-green-600">$0.00</p>
        </div>
        <div class="bg-red-50 p-3 rounded-lg">
          <p class="text-gray-600 text-sm">Expenses</p>
          <p id="expenses" class="text-2xl font-bold text-red-600">$0.00</p>
        </div>
      </div>
    </div>

    <!-- Form -->
    <form id="expenseForm" class="mb-6 space-y-4">
      <div>
        <label for="type" class="block text-sm font-medium text-gray-700 mb-1">Type:</label>
        <select id="type" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          <option value="expense">Expense</option>
          <option value="income">Income</option>
        </select>
      </div>

      <div>
        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Description:</label>
        <input type="text" id="name" placeholder="e.g., Lunch, Salary" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>

      <div>
        <label for="amount" class="block text-sm font-medium text-gray-700 mb-1">Amount:</label>
        <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>

      <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-2 rounded-lg hover:bg-blue-700 transition">
        Add Transaction
      </button>
    </form>

    <!-- Transactions List -->
    <div>
      <h2 class="text-lg font-bold text-gray-800 mb-3">Transactions</h2>
      <div id="transactionsList" class="space-y-2 max-h-96 overflow-y-auto">
        <p class="text-gray-400 text-sm">No transactions yet</p>
      </div>
    </div>
  </div>

  <script src="track.js"></script>
</body>
</html>
